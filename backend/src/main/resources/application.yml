server:
  port: 8080

spring:
  application:
    name: cangying-backend
  profiles:
    active: dev

  # 数据源配置（由各环境配置文件覆盖）
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Redis 配置（由各环境配置文件覆盖）
  redis:
    timeout: 10000

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.cangying.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 日志配置
logging:
  level:
    com.cangying: debug
    org.springframework: info