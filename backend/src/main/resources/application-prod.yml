# 生产环境配置

spring:
  # 数据源配置（由运维配置）
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  # Redis 配置（由运维配置）
  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT}
    password: ${REDIS_PASSWORD}
    database: ${REDIS_DATABASE:0}

# JWT 配置（由运维配置）
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:604800000}

# 微信小程序配置（由运维配置）
wechat:
  appid: ${WECHAT_APPID}
  secret: ${WECHAT_SECRET}

# 腾讯云 COS 配置（由运维配置）
cos:
  bucket: ${COS_BUCKET}
  region: ${COS_REGION}
  secret-id: ${COS_SECRET_ID}
  secret-key: ${COS_SECRET_KEY}

# 生产环境关闭 SQL 日志
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

logging:
  level:
    com.cangying: info